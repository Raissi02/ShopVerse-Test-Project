[pytest]
# ─────────────────────────────────────────────────────────────────────────────
# ShopVerse — pytest master configuration
#
# Install dependencies first:
#   pip install -r requirements.txt
#
# ── Run by level ─────────────────────────────────────────────────────────────
#
#   Unit tests only (no server needed, instant):
#     pytest tests_unit/ -v
#
#   Integration + System tests (requires: dotnet run on port 5000):
#     pytest tests_api/ -v
#
#   E2E Selenium tests (requires: ng serve on 4200 + dotnet run + ChromeDriver):
#     pytest tests_e2e/ -v
#
#   Unit + Integration together (CI-friendly, no browser needed):
#     pytest tests_unit/ tests_api/ -v
#
#   Everything:
#     pytest tests_unit/ tests_api/ tests_e2e/ -v
#
# ── Static analysis (not a pytest suite — run separately) ────────────────────
#   python static/static_analysis.py
#   Report written to: reports/static_analysis.json
# ─────────────────────────────────────────────────────────────────────────────

# Default: unit + integration (no Selenium, no browser required)
testpaths = tests_unit tests_api
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
